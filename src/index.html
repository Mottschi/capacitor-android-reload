<!doctype html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8"/>
    <title>App.getInfo Bug Reproduction</title>
    <meta
            name="viewport"
            content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no"/>
    <meta name="msapplication-tap-highlight" content="no"/>

    <script
            type="module"
            src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.esm.js"
    ></script>
    <script
            nomodule
            src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.js"
    ></script>

    <link rel="icon" type="image/x-icon" href="./assets/icon/favicon.ico"/>
    <link rel="manifest" href="./manifest.json"/>
    <link rel="stylesheet" href="./css/style.css"/>
    <meta name="theme-color" content="#31d53d"/>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            Capacitor.Plugins.SplashScreen.hide();

        });
    </script>
</head>
    <body>
        <div id="toolbar">
            <button id="toggle-edit-view-button" type="button">
                Toggle Editing View
            </button>
            <button id="toggle-data-view-button" type="button">
                Toggle Data View
            </button>
        </div>

        <div class="main-container">
            <div class="editor-container editor-container_inline-editor" id="editor-container">
                <h2>Second Editor Field</h2>
                <div class="editor-container__editor"><div id="editor"></div></div>
            </div>
            <div class="editor-container editor-container_inline-editor" id="editor-container2">
                <h2>Editor</h2>
                <div class="editor-container__editor"><div id="editor2"></div></div>
            </div>
            <div id="output-container">
                <div id="editing-view-output" class="hidden">
                    <h2>Editing View:</h2>
                    <div id="editing-output-text" class="output"></div>
                    <div id="editing-output-rendered" class="output ck-content"></div>
                </div>
                <div id="data-view-output">
                    <h2>Data View:</h2>
                    <div id="data-output-text" class="output"></div>
                    <div id="data-output-rendered" class="output ck-content"></div>
                </div>
            </div>
        </div>

        <div id="footer-toolbar">
            <button onclick="location.reload()">Reload</button>
        </div>
        <script type="module" src="./main.js"></script>
    </body>
</html>
